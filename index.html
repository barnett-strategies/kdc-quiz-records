<!DOCTYPE html>
<html>
<head>
<title>KDC AI Quiz — All-Time Records</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&family=Copse&family=Boogaloo&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* v12 font system — synced with host.html via localStorage 'kdcFont' */
:root{--f-display:var(--f-display);--f-body:var(--f-body)}
body.font-copse{--f-display:'Copse',serif;--f-body:'Copse',serif}
body.font-boogaloo{--f-display:'Boogaloo',cursive;--f-body:'Boogaloo',cursive}
body{background:radial-gradient(ellipse at 25% 15%,#1a0a3a 0%,#0a0a1a 55%,#0d0510 100%);color:#fff;font-family:'Lato',sans-serif;min-height:100vh;padding:0 0 60px}
/* v12 nav buttons — match host.html style */
.nav-btns{display:flex;gap:6px;align-items:center}
.nav-btn{font-family:var(--f-body);font-size:11px;color:rgba(255,215,0,.7);text-decoration:none;padding:7px 16px;border-radius:6px;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);letter-spacing:.08em;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.nav-btn:hover{background:rgba(255,215,0,.2)}
.nav-btn.close{color:rgba(239,68,68,.85);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}
.nav-btn.close:hover{background:rgba(239,68,68,.18)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 8% 12%,rgba(255,215,0,.4) 0%,transparent 100%),radial-gradient(1px 1px at 22% 38%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 55% 8%,rgba(255,215,0,.35) 0%,transparent 100%),radial-gradient(1px 1px at 78% 55%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1px 1px at 42% 78%,rgba(255,215,0,.3) 0%,transparent 100%),radial-gradient(1px 1px at 88% 22%,rgba(255,255,255,.3) 0%,transparent 100%)}

/* Header */
.site-header{position:relative;z-index:2;padding:20px 32px;border-bottom:1px solid rgba(255,215,0,.15);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,26,.7);backdrop-filter:blur(10px)}
.header-logo{font-family:var(--f-display);font-size:20px;background:linear-gradient(180deg,#FFD700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.06em}
.header-sub{font-family:var(--f-body);font-size:10px;color:rgba(255,215,0,.5);letter-spacing:.2em;margin-top:3px}
.home-link{font-family:var(--f-body);font-size:11px;color:rgba(255,215,0,.7);text-decoration:none;padding:7px 16px;border-radius:6px;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);letter-spacing:.1em;transition:all .15s}
.home-link:hover{background:rgba(255,215,0,.2)}

/* Main */
.main{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:32px 24px}

/* Section */
.section-title{font-family:var(--f-display);font-size:22px;background:linear-gradient(180deg,#FFD700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:.06em}
.section-sub{font-family:var(--f-body);font-size:10px;color:rgba(255,215,0,.5);letter-spacing:.18em;text-transform:uppercase;margin-bottom:20px}

/* Top Stats */
.top-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,215,0,.18);border-radius:12px;padding:16px 20px;text-align:center}
.stat-num{font-family:var(--f-display);font-size:34px;background:linear-gradient(180deg,#FFD700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stat-label{font-family:var(--f-body);font-size:10px;color:rgba(255,215,0,.5);letter-spacing:.15em;text-transform:uppercase;margin-top:6px}

/* Podium */
.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:14px;margin-bottom:32px;align-items:end}
.pod{padding:20px 14px;border-radius:14px;text-align:center;border:1.5px solid;cursor:pointer;transition:transform .15s;position:relative}
.pod:hover{transform:translateY(-3px)}
.pod.gold{background:linear-gradient(160deg,rgba(255,215,0,.14),rgba(184,134,11,.07));border-color:rgba(255,215,0,.5);box-shadow:0 0 28px rgba(255,215,0,.15);min-height:200px}
.pod.silver{background:linear-gradient(160deg,rgba(192,192,192,.1),rgba(140,140,140,.04));border-color:rgba(192,192,192,.35);min-height:175px}
.pod.bronze{background:linear-gradient(160deg,rgba(205,127,50,.12),rgba(154,86,21,.04));border-color:rgba(205,127,50,.35);min-height:165px}
.pod-medal{font-size:28px;margin-bottom:6px}
.pod-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid}
.pod-av img{width:100%;height:100%;object-fit:cover}
.pod-name{font-family:var(--f-body);font-size:16px;font-weight:700;margin-bottom:2px}
.pod-title{font-family:var(--f-body);font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.pod-wins{font-family:var(--f-display);font-size:28px;line-height:1}
.pod-wins-lbl{font-family:var(--f-body);font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}

/* Full standings */
.standings{display:flex;flex-direction:column;gap:6px;margin-bottom:32px}
.sr{display:grid;grid-template-columns:36px 44px 1fr 80px 80px 80px 80px 80px;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);transition:border-color .15s}
.sr:hover{border-color:rgba(255,215,0,.25)}
.sr-rank{font-family:var(--f-body);font-size:13px;color:rgba(255,255,255,.35);text-align:center}
.sr-av{width:36px;height:36px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;border:1.5px solid;flex-shrink:0}
.sr-av img{width:100%;height:100%;object-fit:cover}
.sr-name{font-family:var(--f-body);font-size:14px;font-weight:700}
.sr-title{font-family:var(--f-body);font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.sr-stat{text-align:center}
.sr-stat-num{font-family:var(--f-display);font-size:15px}
.sr-stat-lbl{font-family:var(--f-body);font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.sr-header{background:transparent;border-color:transparent;padding:4px 16px}
.sr-header .sr-stat-lbl{font-size:9px;color:rgba(255,215,0,.5)}

/* Records */
.records-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.rec-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,215,0,.15);border-radius:12px;padding:16px}
.rec-icon{font-size:28px;margin-bottom:8px}
.rec-label{font-family:var(--f-body);font-size:10px;color:rgba(255,215,0,.55);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.rec-value{font-family:var(--f-display);font-size:20px;line-height:1.2}
.rec-sub{font-family:'Lato',sans-serif;font-size:11px;color:rgba(255,255,255,.45);margin-top:4px}

/* v21 Trophy Room — the ten royal achievements */
.trophy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px;margin-bottom:32px}
.tcard{position:relative;background:linear-gradient(165deg,rgba(255,215,0,.09),rgba(255,255,255,.03) 55%);border:1.5px solid rgba(255,215,0,.4);border-radius:12px;padding:12px 10px 10px;text-align:center;overflow:hidden;transition:transform .15s,box-shadow .15s}
.tcard:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(255,215,0,.18)}
.tcard.unclaimed{background:rgba(255,255,255,.025);border-color:rgba(255,255,255,.1);opacity:.75}
.tcard.unclaimed:hover{box-shadow:none}
.t-icon{font-size:25px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 0 10px rgba(255,215,0,.35))}
.tcard.unclaimed .t-icon{filter:grayscale(.7);opacity:.5}
.t-title{font-family:var(--f-display);font-size:11.5px;background:linear-gradient(180deg,#FFD700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.03em;margin-bottom:2px}
.t-desc{font-family:'Lato',sans-serif;font-size:9px;color:rgba(255,255,255,.4);min-height:22px;margin-bottom:8px}
.t-holder{display:flex;align-items:center;justify-content:center;gap:6px}
.t-av{width:26px;height:26px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid rgba(255,215,0,.7);flex-shrink:0}
.t-av img{width:100%;height:100%;object-fit:cover}
.t-hname{font-family:var(--f-body);font-size:11.5px;font-weight:700;text-align:left}
.t-stat{font-family:var(--f-body);font-size:9px;color:rgba(255,215,0,.75);letter-spacing:.05em;margin-top:1px;text-align:left}
.t-unclaimed{font-family:var(--f-body);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;padding:8px 0}
.t-new{position:absolute;top:8px;right:-26px;transform:rotate(38deg);background:linear-gradient(180deg,#FFD700,#c9a227);color:#1a0a3a;font-family:var(--f-body);font-size:8px;font-weight:800;letter-spacing:.12em;padding:2px 28px;box-shadow:0 2px 8px rgba(0,0,0,.4)}

/* Game history */
.game-list{display:flex;flex-direction:column;gap:8px}
.game-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:13px 18px;display:flex;align-items:center;gap:14px;transition:border-color .15s}
.game-row:hover{border-color:rgba(255,215,0,.25)}
.game-date{font-family:var(--f-body);font-size:11px;color:rgba(255,215,0,.55);letter-spacing:.08em;min-width:100px}
.game-name{flex:1;font-family:var(--f-body);font-size:13px;font-weight:700;color:#fff}
.game-winner{display:flex;align-items:center;gap:8px;font-family:var(--f-body);font-size:12px}
.game-winner-av{width:26px;height:26px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid}
.game-winner-av img{width:100%;height:100%;object-fit:cover}
.game-qs{font-family:var(--f-body);font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.08em;min-width:60px;text-align:right}
.game-graph{min-width:76px;text-align:right}
.game-graph a{display:inline-flex;align-items:center;gap:4px;font-family:var(--f-body);font-size:11px;font-weight:700;color:#5eb0ff;text-decoration:none;padding:4px 9px;border:1px solid rgba(94,176,255,.35);border-radius:8px;background:rgba(94,176,255,.08)}
.game-graph a:hover{background:rgba(94,176,255,.2)}
.game-graph .none{font-size:16px;color:rgba(255,255,255,.15)}
.podium-section{margin-bottom:32px}
.empty{text-align:center;padding:48px 20px;font-family:var(--f-body);font-size:14px;color:rgba(255,215,0,.5);letter-spacing:.15em}

/* Bar chart */
.bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.bar-label{font-family:var(--f-body);font-size:11px;color:rgba(255,255,255,.65);min-width:110px}
.bar-track{flex:1;height:16px;background:rgba(255,255,255,.06);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:var(--f-body);font-size:9px;font-weight:700;color:#0a0a1a;min-width:20px}
.bar-num{font-family:var(--f-display);font-size:12px;min-width:32px;text-align:right}
</style>

<script>
// ─── KDC AI Quiz — Achievements Engine (v21) ─────────────────────────────────
// Shared by leaderboard.html (Trophy Room grid) and host.html (game-end toasts).
// Computes the ten royal achievements from saved history. Per-question awards
// read game.questionLog (v21+); older games don't count — forward-only by design.
var KDC_ACHIEVEMENTS = (function(){
  var DEFS = [
    { key:'humbug',    icon:'\uD83D\uDE20', title:'The HumBug',       desc:'Most first-wrong answers, all time' },
    { key:'crown',     icon:'\u26A1',       title:'Fastest Crown',    desc:'Most first-correct speed bonuses' },
    { key:'lonewolf',  icon:'\uD83D\uDC3A', title:'Lone Wolf',        desc:'Most lone-correct answers' },
    { key:'hotstreak', icon:'\uD83D\uDD25', title:'Hot Streak',       desc:'Longest correct run in one game (min 3)' },
    { key:'court',     icon:'\u2696\uFE0F', title:'Courtroom Royalty',desc:'Most challenge flags won' },
    { key:'gambler',   icon:'\uD83C\uDFB2', title:'Riverboat Gambler',desc:'Biggest single Double Trouble win' },
    { key:'comeback',  icon:'\uD83D\uDE80', title:'Comeback Kid',     desc:'Biggest rank climb after halftime' },
    { key:'perfect',   icon:'\uD83D\uDCAF', title:'Perfect Game',     desc:'Flawless game — 8+ answered, all correct' },
    { key:'dynasty',   icon:'\uD83C\uDFC6', title:'Dynasty',          desc:'Most all-time game wins' },
    { key:'iron',      icon:'\uD83C\uDFAA', title:'Iron Contestant',  desc:'Most games played' }
  ];

  function blank(){ return { humbug:0, humbugLast:'', fb:0, lb:0, faced:0, hot:0, hotDate:'',
    chWin:0, chTry:0, dtBest:0, dtCareer:0, climb:-99, climbSwing:0,
    perfectN:0, perfectDate:'', wins:0, games:0, first:'' }; }

  function compute(history, players){
    var P = {}; (players||[]).forEach(function(p){ P[p.id]=true; });
    var S = {};
    function st(id){ if(!S[id]) S[id]=blank(); return S[id]; }

    var games = (history||[]).slice().reverse(); // oldest → newest (earliest record holds ties)
    games.forEach(function(g){
      var ids = Object.keys(g.scores||{}).filter(function(id){ return P[id]; });
      ids.forEach(function(id){ var s=st(id); s.games++; if(!s.first) s.first=g.date||''; });
      if (!g.teamPlay && g.ranked && g.ranked[0] && P[g.ranked[0].id]) st(g.ranked[0].id).wins++;
      if (g.humbugs) Object.keys(g.humbugs).forEach(function(id){
        if(P[id]){ st(id).humbug += g.humbugs[id]||0; st(id).humbugLast = g.date||''; }
      });
      var log = g.questionLog||[];
      if (!log.length) return;

      var cur={}, cum={}, halfCum=null, gAns={}, gFlaw={};
      var halfIdx = Math.max(1, Math.floor(log.length/2));
      log.forEach(function(e, qi){
        Object.keys(e.ans||{}).forEach(function(id){
          if(!P[id]) return;
          var a=e.ans[id], s=st(id);
          cum[id]=(cum[id]||0)+(a.pts||0)+(a.fb||0)+(a.lb||0);
          if (a.passed) return;
          s.faced++; gAns[id]=(gAns[id]||0)+1;
          if (a.fb>0) s.fb++;
          if (a.lb>0) s.lb++;
          if (a.ok && a.w>0){ if(a.w>s.dtBest) s.dtBest=a.w; s.dtCareer+=a.w; }
          if (a.ok){
            cur[id]=(cur[id]||0)+1;
            if (cur[id] > s.hot){ s.hot=cur[id]; s.hotDate=g.date||''; }
          } else {
            cur[id]=0; gFlaw[id]=true;
          }
        });
        if (e.challenged && e.challenged.playerId && P[e.challenged.playerId]){
          var cs = st(e.challenged.playerId);
          cs.chTry++;
          if (e.challenged.verdict==='upheld'||e.challenged.verdict==='alternative') cs.chWin++;
        }
        if (qi === halfIdx-1){ halfCum={}; Object.keys(cum).forEach(function(id){ halfCum[id]=cum[id]; }); }
      });

      // Comeback Kid — rank at halftime vs final rank
      if (halfCum && g.ranked && g.ranked.length>1 && log.length>=4){
        var halfOrder = Object.keys(g.scores||{}).filter(function(id){ return P[id]; })
          .sort(function(a,b){ return (halfCum[b]||0)-(halfCum[a]||0); });
        g.ranked.forEach(function(r, fi){
          if(!P[r.id]) return;
          var hi = halfOrder.indexOf(r.id); if(hi===-1) return;
          var climb = hi - fi, s = st(r.id);
          if (climb > s.climb){ s.climb=climb; s.climbSwing=(g.scores[r.id]||0)-(halfCum[r.id]||0); }
        });
      }
      // Perfect Game — 8+ answered, zero wrong
      Object.keys(gAns).forEach(function(id){
        if (gAns[id]>=8 && !gFlaw[id] && gAns[id] > st(id).perfectN){
          st(id).perfectN=gAns[id]; st(id).perfectDate=g.date||'';
        }
      });
    });

    // Pick a holder per achievement: primary value desc, then tie-break chain
    function pick(val, tbs){
      var best=null, ids=Object.keys(S);
      ids.forEach(function(id){
        var v=val(S[id]); if(v<=0) return;
        if(!best){ best={id:id,v:v}; return; }
        var bv=val(S[best.id]);
        if (v>bv){ best={id:id,v:v}; return; }
        if (v<bv) return;
        for (var i=0;i<tbs.length;i++){
          var d = tbs[i](S[id]) - tbs[i](S[best.id]);
          if (d>0){ best={id:id,v:v}; return; }
          if (d<0) return;
        }
      });
      return best;
    }
    function fmt(n){ return (n||0).toLocaleString('en-US'); }
    var out = {};
    var h;
    h=pick(function(s){return s.humbug;},[function(s){return s.games?s.humbug/s.games:0;},function(s){return Date.parse(s.humbugLast)||0;}]);
    out.humbug   = h && { id:h.id, value:h.v, stat: fmt(h.v)+' first-wrong answers' };
    h=pick(function(s){return s.fb;},[function(s){return s.faced?s.fb/s.faced:0;}]);
    out.crown    = h && { id:h.id, value:h.v, stat: fmt(h.v)+' speed bonuses' };
    h=pick(function(s){return s.lb;},[function(s){return s.faced?s.lb/s.faced:0;}]);
    out.lonewolf = h && { id:h.id, value:h.v, stat: fmt(h.v)+' lone-correct answers' };
    h=pick(function(s){return s.hot>=3?s.hot:0;},[function(s){return -(Date.parse(s.hotDate)||0);}]);
    out.hotstreak= h && { id:h.id, value:h.v, stat: fmt(h.v)+' correct in a row' };
    h=pick(function(s){return s.chWin;},[function(s){return s.chTry?s.chWin/s.chTry:0;}]);
    out.court    = h && { id:h.id, value:h.v, stat: fmt(h.v)+' challenges won' };
    h=pick(function(s){return s.dtBest;},[function(s){return s.dtCareer;}]);
    out.gambler  = h && { id:h.id, value:h.v, stat: '+'+fmt(h.v)+' single wager' };
    h=pick(function(s){return s.climb>0?s.climb:0;},[function(s){return s.climbSwing;}]);
    out.comeback = h && { id:h.id, value:h.v, stat: 'climbed '+fmt(h.v)+(h.v===1?' spot':' spots') };
    h=pick(function(s){return s.perfectN;},[]);
    out.perfect  = h && { id:h.id, value:h.v, stat: fmt(h.v)+' for '+fmt(h.v) };
    h=pick(function(s){return s.wins;},[function(s){return s.games?s.wins/s.games:0;}]);
    out.dynasty  = h && { id:h.id, value:h.v, stat: fmt(h.v)+(h.v===1?' win':' wins') };
    // v22.1: Iron Contestant honors ties — showing up is the one crown no
    // tiebreaker may steal. Level on games played = contested, held by no one.
    (function(){
      var best = 0;
      Object.keys(S).forEach(function(id){ if (S[id].games > best) best = S[id].games; });
      if (!best) { out.iron = null; return; }
      var tied = Object.keys(S).filter(function(id){ return S[id].games === best; });
      out.iron = tied.length > 1
        ? { tie: true, value: best, count: tied.length, ids: tied,
            stat: tied.length + ' players tied \u00b7 ' + fmt(best) + (best === 1 ? ' game' : ' games') + ' each' }
        : { id: tied[0], value: best, stat: fmt(best) + (best === 1 ? ' game' : ' games') + ' played' };
    })();

    return DEFS.map(function(d){
      return { key:d.key, icon:d.icon, title:d.title, desc:d.desc, holder: out[d.key]||null };
    });
  }

  // Diff full history vs history-without-newest-game → toast-worthy changes
  function newlyEarned(history, players){
    if (!history || !history.length) return [];
    var withAll  = compute(history, players);
    var without  = compute(history.slice(1), players); // history is newest-first
    var news = [];
    withAll.forEach(function(a, i){
      var b = without[i];
      if (!a.holder) return;
      if (a.holder.tie) return; // contested crowns make no announcements
      if (!b.holder || b.holder.tie) { news.push({ key:a.key, icon:a.icon, title:a.title, holder:a.holder, kind:'claimed' }); return; }
      if (a.holder.id !== b.holder.id) { news.push({ key:a.key, icon:a.icon, title:a.title, holder:a.holder, kind:'taken' }); return; }
      if (a.holder.value !== b.holder.value) news.push({ key:a.key, icon:a.icon, title:a.title, holder:a.holder, kind:'improved' });
    });
    return news;
  }

  return { DEFS: DEFS, compute: compute, newlyEarned: newlyEarned };
})();

</script>
<script>
var PMAP = {}, ALL_PLAYERS = [], HISTORY = [];
var MEDALS = ['🥇','🥈','🥉'];

Promise.all([
  fetch('/api/players').then(function(r){return r.json();}),
  fetch('/api/history').then(function(r){return r.json();})
]).then(function(results){
  ALL_PLAYERS = results[0].players;
  HISTORY     = results[1].history;
  ALL_PLAYERS.forEach(function(p){ PMAP[p.id]=p; });
  render();
});

function render(){
  if(!ALL_PLAYERS.length){ document.getElementById('main').innerHTML='<div class="empty">No players found.</div>'; return; }

  // ─── Compute stats ──────────────────────────────────────────────────────
  var stats = {};
  ALL_PLAYERS.forEach(function(p){
    stats[p.id]={id:p.id,wins:0,games:0,totalPoints:0,bestGame:0,bestGameDate:'',streak:0,maxStreak:0,lastWon:false};
  });

  // Process history newest→oldest
  var reversed = HISTORY.slice().reverse(); // oldest first for streak calc
  reversed.forEach(function(game){
    if(!game.ranked||!game.ranked.length) return;
    game.ranked.forEach(function(r,i){
      if(!stats[r.id]) return;
      stats[r.id].games++;
      stats[r.id].totalPoints += r.score||0;
      if(r.score > stats[r.id].bestGame){ stats[r.id].bestGame=r.score; stats[r.id].bestGameDate=game.date; }
      if(i===0){
        stats[r.id].wins++;
        stats[r.id].streak++;
        if(stats[r.id].streak>stats[r.id].maxStreak) stats[r.id].maxStreak=stats[r.id].streak;
        stats[r.id].lastWon=true;
      } else {
        stats[r.id].streak=0;
        stats[r.id].lastWon=false;
      }
    });
  });

  var playerStats = ALL_PLAYERS.map(function(p){ return Object.assign({},p,stats[p.id]||{}); })
    .filter(function(p){ return p.games>0; })
    .sort(function(a,b){ return b.wins-a.wins||b.totalPoints-a.totalPoints; });

  var noHistory = HISTORY.length === 0;

  var html = '';

  // ─── Top Stats ──────────────────────────────────────────────────────────
  var totalGames    = HISTORY.length;
  var totalQs       = HISTORY.reduce(function(s,g){return s+(g.questionsPlayed||0);},0);
  var topWinner     = playerStats[0];
  var highestScore  = playerStats.reduce(function(best,p){return p.bestGame>best?p.bestGame:best;},0);

  html += '<div class="top-stats">';
  html += '<div class="stat-card"><div class="stat-num">'+totalGames+'</div><div class="stat-label">Games Played</div></div>';
  html += '<div class="stat-card"><div class="stat-num">'+totalQs+'</div><div class="stat-label">Questions Asked</div></div>';
  html += '<div class="stat-card"><div class="stat-num">'+ALL_PLAYERS.length+'</div><div class="stat-label">Players</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="font-size:22px;padding-top:6px">'+(topWinner?avHtml(topWinner,32)+' '+topWinner.name:'–')+'</div><div class="stat-label">Reigning Champ</div></div>';
  html += '</div>';

  if(noHistory){
    html += '<div class="empty">No games saved yet.<br><br>Play a game and hit 💾 Save on the scores screen to start building your records.</div>';
    document.getElementById('main').innerHTML=html; return;
  }

  // ─── Podium ─────────────────────────────────────────────────────────────
  if(playerStats.length>=1){
    html += '<div class="podium-section">';
    html += '<div class="section-title">🏆 Hall of Fame</div>';
    html += '<div class="section-sub">All-time standings</div>';
    html += '<div class="podium">';
    var podOrder = playerStats.length>=3 ? [playerStats[1],playerStats[0],playerStats[2]] : playerStats.length===2 ? [playerStats[1],playerStats[0],null] : [null,playerStats[0],null];
    var podClasses = ['silver','gold','bronze'];
    podOrder.forEach(function(p,i){
      if(!p){html+='<div></div>';return;}
      var rank = playerStats.indexOf(p);
      html += '<div class="pod '+podClasses[i]+'">';
      html += '<div class="pod-medal">'+(MEDALS[rank]||'')+'</div>';
      html += '<div class="pod-av" style="background:'+p.color+'20;border-color:'+p.color+'">'+avInner(p)+'</div>';
      html += '<div class="pod-name" style="color:'+p.color+'">'+p.name+'</div>';
      html += '<div class="pod-title">'+p.title+'</div>';
      html += '<div class="pod-wins" style="color:'+p.color+'">'+p.wins+'</div>';
      html += '<div class="pod-wins-lbl">Wins</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // ─── v21 Trophy Room — the ten royal achievements ────────────────────────
  try {
    var trophies = KDC_ACHIEVEMENTS.compute(HISTORY, ALL_PLAYERS);
    var fresh = {}; KDC_ACHIEVEMENTS.newlyEarned(HISTORY, ALL_PLAYERS).forEach(function(n){ fresh[n.key]=true; });
    html += '<div class="section-title">🏅 Trophy Room</div>';
    html += '<div class="section-sub">The ten royal achievements · forward-only from July 2026</div>';
    html += '<div class="trophy-grid">';
    trophies.forEach(function(t){
      var p = t.holder && !t.holder.tie && PMAP[t.holder.id];
      if (t.holder && t.holder.tie) {
        html += '<div class="tcard">'
          + '<div class="t-icon">'+t.icon+'</div>'
          + '<div class="t-title">'+t.title+'</div>'
          + '<div class="t-desc">'+t.desc+'</div>'
          + '<div class="t-holder"><div><div class="t-hname" style="color:#FFD700">\uD83E\uDD1D Contested</div>'
          + '<div class="t-stat">'+t.holder.stat+'</div></div></div>'
          + '</div>';
      } else
      if (p) {
        html += '<div class="tcard">'
          + (fresh[t.key] ? '<div class="t-new">NEW</div>' : '')
          + '<div class="t-icon">'+t.icon+'</div>'
          + '<div class="t-title">'+t.title+'</div>'
          + '<div class="t-desc">'+t.desc+'</div>'
          + '<div class="t-holder"><div class="t-av" style="background:'+(p.color||'#FFD700')+'20">'+avInner(p)+'</div>'
          + '<div><div class="t-hname" style="color:'+(p.color||'#fff')+'">'+p.name+'</div>'
          + '<div class="t-stat">'+t.holder.stat+'</div></div></div>'
          + '</div>';
      } else {
        html += '<div class="tcard unclaimed">'
          + '<div class="t-icon">'+t.icon+'</div>'
          + '<div class="t-title">'+t.title+'</div>'
          + '<div class="t-desc">'+t.desc+'</div>'
          + '<div class="t-unclaimed">👑 Unclaimed</div>'
          + '</div>';
      }
    });
    html += '</div>';
  } catch(e) { console.error('trophy room:', e); }

  // ─── Full Standings ──────────────────────────────────────────────────────
  html += '<div class="section-title">📊 Full Standings</div>';
  html += '<div class="section-sub">All players · sorted by wins</div>';
  html += '<div class="standings">';
  // Header
  html += '<div class="sr sr-header"><div></div><div></div><div></div>'
    +'<div class="sr-stat"><div class="sr-stat-lbl">Wins</div></div>'
    +'<div class="sr-stat"><div class="sr-stat-lbl">Games</div></div>'
    +'<div class="sr-stat"><div class="sr-stat-lbl">Win %</div></div>'
    +'<div class="sr-stat"><div class="sr-stat-lbl">Total Pts</div></div>'
    +'<div class="sr-stat"><div class="sr-stat-lbl">Best Game</div></div>'
    +'</div>';
  playerStats.forEach(function(p,i){
    var winPct = p.games ? Math.round(p.wins/p.games*100) : 0;
    html += '<div class="sr">'
      +'<div class="sr-rank">'+(MEDALS[i]||('#'+(i+1)))+'</div>'
      +'<div class="sr-av" style="background:'+p.color+'20;border-color:'+p.color+'">'+avInner(p)+'</div>'
      +'<div><div class="sr-name" style="color:'+p.color+'">'+p.name+'</div><div class="sr-title">'+p.title+'</div></div>'
      +'<div class="sr-stat"><div class="sr-stat-num" style="color:'+p.color+'">'+p.wins+'</div></div>'
      +'<div class="sr-stat"><div class="sr-stat-num">'+p.games+'</div></div>'
      +'<div class="sr-stat"><div class="sr-stat-num">'+winPct+'%</div></div>'
      +'<div class="sr-stat"><div class="sr-stat-num">'+p.totalPoints.toLocaleString()+'</div></div>'
      +'<div class="sr-stat"><div class="sr-stat-num" style="color:'+p.color+'">'+p.bestGame.toLocaleString()+'</div></div>'
      +'</div>';
  });
  html += '</div>';

  // ─── Records ─────────────────────────────────────────────────────────────
  var mostWins   = playerStats[0];
  var bestSingle = playerStats.reduce(function(b,p){return p.bestGame>b.bestGame?p:b;},playerStats[0]);
  var bestStreak = playerStats.reduce(function(b,p){return p.maxStreak>b.maxStreak?p:b;},playerStats[0]);
  var mostGames  = playerStats.reduce(function(b,p){return p.games>b.games?p:b;},playerStats[0]);
  var bestAvg    = playerStats.filter(function(p){return p.games>0;}).reduce(function(b,p){
    var avg=p.totalPoints/p.games; var bavg=b.totalPoints/b.games; return avg>bavg?p:b;
  },playerStats[0]);
  var winRate    = playerStats.filter(function(p){return p.games>=2;}).reduce(function(b,p){
    var wr=p.wins/p.games; var bwr=b.wins/b.games; return wr>bwr?p:b;
  },playerStats[0]);

  html += '<div class="section-title">🌟 Records</div>';
  html += '<div class="section-sub">All-time achievements</div>';
  html += '<div class="records-grid">';
  // v22.1: Most Wins + Most Games Played retired — Dynasty and Iron Contestant own these in the Trophy Room
  html += recCard('💯','Best Single Game',bestSingle?(avHtml(bestSingle,24)+' '+bestSingle.name):'–',bestSingle?bestSingle.bestGame.toLocaleString()+' pts · '+fmtDate(bestSingle.bestGameDate):'');
  html += recCard('🔥','Longest Win Streak',bestStreak?(avHtml(bestStreak,24)+' '+bestStreak.name+' — '+bestStreak.maxStreak+' in a row'):'–','');
  html += recCard('📈','Best Win Rate',winRate?(avHtml(winRate,24)+' '+winRate.name+' — '+Math.round(winRate.wins/winRate.games*100)+'%'):'–',winRate?winRate.wins+' wins / '+winRate.games+' games':'');
  html += recCard('📊','Highest Avg Score',bestAvg?(avHtml(bestAvg,24)+' '+bestAvg.name):'–',bestAvg?Math.round(bestAvg.totalPoints/bestAvg.games).toLocaleString()+' pts per game':'');
  html += '</div>';

  // ─── Win leaders bar chart ────────────────────────────────────────────────
  html += '<div class="section-title">🏅 Win Leaders</div>';
  html += '<div class="section-sub">Total first-place finishes</div>';
  var maxWins = playerStats[0] ? playerStats[0].wins : 1;
  html += '<div style="max-width:600px;margin-bottom:32px">';
  playerStats.slice(0,8).forEach(function(p){
    var pct = maxWins ? Math.max(8, Math.round(p.wins/maxWins*100)) : 8;
    html += '<div class="bar-wrap">'
      +'<div class="bar-label">'+avHtml(p,20)+' '+p.name+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+p.color+'">'+( pct>20?p.wins:'' )+'</div></div>'
      +'<div class="bar-num" style="color:'+p.color+'">'+p.wins+'</div>'
      +'</div>';
  });
  html += '</div>';

  // ─── Game History ─────────────────────────────────────────────────────────
  html += '<div class="section-title">📅 Game History</div>';
  html += '<div class="section-sub">Every KDC quiz night</div>';
  html += '<div class="game-list">';
  HISTORY.forEach(function(game){
    var wp = game.ranked && game.ranked[0] ? PMAP[game.ranked[0].id] : null;
    var score = game.ranked && game.ranked[0] ? game.ranked[0].score : 0;
    html += '<div class="game-row">'
      +'<div class="game-date">'+fmtDate(game.date)+'</div>'
      +'<div class="game-name">'+game.name+'</div>'
      +'<div class="game-winner">'
        +(wp?'<div class="game-winner-av" style="background:'+wp.color+'20;border-color:'+wp.color+'">'+avInner(wp)+'</div><span style="color:'+(wp?wp.color:'#FFD700')+'">'+game.winner+'</span><span style="font-family:var(--f-display);color:rgba(255,215,0,.6)">'+score.toLocaleString()+'</span>':'–')
      +'</div>'
      +'<div class="game-qs">'+(game.questionsPlayed||0)+' Qs</div>'
      +'<div class="game-graph">'+((game.winProbArc&&game.winProbArc.length)?'<a href="/winprob?game='+game.gameId+'" title="View win-probability graph">📈 Graph</a>':'<span class="none">–</span>')+((game.questionLog&&game.questionLog.length)?' <a href="/recap?game='+game.gameId+'" title="Post-game recap">📜 Recap</a>':'')+'</div>'
      +'</div>';
  });
  if(!HISTORY.length) html += '<div class="empty" style="padding:20px">No games yet — play and save a game to see history here.</div>';
  html += '</div>';

  document.getElementById('main').innerHTML = html;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function avInner(p){
  if(p.hasPhoto) return '<img src="/photos/'+p.id+'.jpg" style="width:100%;height:100%;object-fit:cover">';
  return p.emoji;
}
function avHtml(p, size){
  size = size||28;
  return '<span style="display:inline-flex;width:'+size+'px;height:'+size+'px;border-radius:50%;overflow:hidden;border:1.5px solid '+p.color+';vertical-align:middle;background:'+p.color+'20;align-items:center;justify-content:center;font-size:'+(size*.5)+'px;flex-shrink:0">'+avInner(p)+'</span>';
}
function recCard(icon, label, value, sub){
  return '<div class="rec-card"><div class="rec-icon">'+icon+'</div><div class="rec-label">'+label+'</div><div class="rec-value" style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+value+'</div>'+(sub?'<div class="rec-sub">'+sub+'</div>':'')+'</div>';
}
function fmtDate(iso){
  if(!iso) return '';
  try{var d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return iso.slice(0,10);}
}
</script>
</body>
</html>
